<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a1626">
<title id="doctitle">World Cup 2026 — Knockout Predictions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1626; --bg2:#0d1b2a; --card:#13243a;
    --line:#243a57; --text:#eef4fb; --sub:#8ea6c4;
    --gold:#e0a82e; --gold-dim:#b8861f; --green:#2ec27e;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth; -webkit-text-size-adjust:100%}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(224,168,46,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(46,194,126,.08), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Outfit',system-ui,-apple-system,sans-serif;
    line-height:1.5; padding:0 0 calc(140px + var(--safe-bot)); min-height:100vh;
  }
  .wrap{max-width:680px;margin:0 auto;padding:0 16px}

  header{padding:48px 16px 24px;text-align:center;position:relative;overflow:hidden;padding-top:calc(40px + var(--safe-top))}
  header::before{
    content:""; position:absolute; inset:0; opacity:.06; pointer-events:none;
    background-image:repeating-linear-gradient(90deg,#fff 0 2px,transparent 2px 52px);
  }
  .kicker{
    font-family:'Space Mono',monospace; letter-spacing:.38em; text-transform:uppercase;
    color:var(--gold); font-size:11px; margin-bottom:12px;
  }
  h1{
    font-family:'Archivo Black',sans-serif; font-size:clamp(28px,6.5vw,48px);
    line-height:.95; letter-spacing:-.02em; text-transform:uppercase;
  }
  h1 .em{color:var(--gold)}
  .sub{color:var(--sub);margin:14px auto 0;font-size:14px;max-width:500px;padding:0 4px}

  .progress{
    position:sticky; top:0; z-index:30; background:rgba(10,22,38,.94);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    padding:10px 16px;
    padding-top:calc(10px + var(--safe-top));
    margin-bottom:22px;
  }
  .progress .bartrack{height:7px;background:var(--bg2);border-radius:6px;overflow:hidden}
  .progress .barfill{height:100%;width:0;background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width .25s, background .25s}
  .progress .barfill.over{background:#e84a5f}
  .progress .ptext{font-family:'Space Mono',monospace;font-size:11.5px;color:var(--sub);margin-top:6px;display:flex;justify-content:space-between}
  .progress .ptext .pcount.exact{color:var(--green)}
  .progress .ptext .pcount.over{color:#e84a5f}

  .namebar{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; margin:8px 0 22px; display:flex; gap:12px; align-items:center;
    flex-wrap:wrap; box-shadow:0 18px 40px -28px rgba(0,0,0,.9);
  }
  .namebar label{font-weight:600;font-size:14px;white-space:nowrap}
  .namebar input{
    flex:1; min-width:160px; background:var(--bg2); border:1px solid var(--line);
    color:var(--text); font:inherit; font-size:16px; padding:11px 13px; border-radius:10px;
  }
  .namebar input:focus{outline:none; border-color:var(--gold)}

  .teamgrid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(170px, 1fr));
    gap:8px;
    margin-bottom:24px;
  }
  .team-btn{
    background:var(--card); border:1.5px solid var(--line);
    color:var(--text); font:inherit; font-weight:600; font-size:15px;
    padding:14px 14px; border-radius:11px; cursor:pointer;
    transition:transform .08s, background .15s, border-color .15s, color .15s;
    text-align:left; position:relative; padding-left:42px;
    min-height:52px;
  }
  .team-btn:active{transform:translateY(1px)}
  .team-btn::before{
    content:""; position:absolute; left:13px; top:50%; transform:translateY(-50%);
    width:18px; height:18px; border-radius:50%;
    border:1.8px solid var(--sub); background:transparent;
    transition:border-color .15s, background .15s;
  }
  .team-btn.sel{
    background:linear-gradient(180deg, rgba(46,194,126,.18), rgba(46,194,126,.10));
    border-color:var(--green); color:var(--text);
  }
  .team-btn.sel::before{
    background:var(--green); border-color:var(--green);
    box-shadow: inset 0 0 0 4px #04210f;
  }
  .team-btn.sel::after{
    content:"✓"; position:absolute; left:17px; top:50%; transform:translateY(-52%);
    color:#04210f; font-weight:900; font-size:13px; z-index:1;
  }

  .footer-actions{
    position:fixed; left:0; right:0; bottom:0; z-index:40;
    background:linear-gradient(transparent, rgba(10,22,38,.97) 26%);
    padding:18px 16px calc(16px + var(--safe-bot));
  }
  .footer-inner{max-width:680px;margin:0 auto}
  .btn-row{display:flex;gap:8px;align-items:stretch;flex-wrap:nowrap}
  button.btn-primary{
    font-family:'Outfit',sans-serif; font-weight:700; font-size:15.5px; cursor:pointer;
    border:none; border-radius:12px; padding:14px 18px;
    background:linear-gradient(180deg,var(--gold),var(--gold-dim)); color:#1a1205;
    flex:2; min-width:0;
    box-shadow:0 14px 30px -12px rgba(224,168,46,.6);
    transition:transform .08s, filter .2s;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  button.btn-primary:active{transform:translateY(1px)}
  button.btn-primary:disabled{filter:grayscale(.7) brightness(.7);cursor:not-allowed;box-shadow:none}
  button.btn-secondary{
    font-family:'Outfit',sans-serif; font-weight:600; font-size:14px; cursor:pointer;
    border:1.5px solid var(--line); border-radius:12px; padding:14px 12px;
    background:var(--bg2); color:var(--text);
    flex:1; min-width:0;
    transition:transform .08s, border-color .15s, background .15s;
    display:flex;align-items:center;justify-content:center;gap:6px;
    white-space:nowrap; overflow:hidden;
  }
  button.btn-secondary:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
  button.btn-secondary:active{transform:translateY(1px)}
  button.btn-secondary:disabled{opacity:.4;cursor:not-allowed}
  button.btn-secondary.confirmed{
    border-color:var(--green); color:var(--green); background:rgba(46,194,126,.08);
  }
  button.btn-secondary svg{width:16px;height:16px;flex-shrink:0}
  @media (max-width:420px){
    button.btn-primary{font-size:14.5px;padding:13px 12px;flex:1.6}
    button.btn-secondary{font-size:13px;padding:13px 8px;flex:0 0 auto;width:48px}
    button.btn-secondary .lbl{display:none}
    .teamgrid{grid-template-columns:repeat(2, 1fr)}
    .team-btn{font-size:14px;padding:12px 10px 12px 38px;min-height:48px}
  }
  .hint{font-family:'Space Mono',monospace;font-size:11.5px;color:var(--sub);text-align:center;margin-bottom:10px;line-height:1.4}

  .toast{
    position:fixed; left:50%; top:calc(var(--safe-top) + 14px);
    transform:translateX(-50%) translateY(-20px);
    background:var(--green); color:#04210f; font-weight:700;
    padding:12px 20px; border-radius:12px; font-size:14px;
    box-shadow:0 16px 40px -14px rgba(0,0,0,.7);
    opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity .25s ease, transform .35s cubic-bezier(.2,1.2,.4,1), visibility .25s;
    z-index:60; max-width:calc(100% - 32px);
  }
  .toast.show{opacity:1; visibility:visible; transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="kicker">Prediction League · 2026 World Cup</div>
    <h1 id="title"></h1>
    <p class="sub" id="lede"></p>
  </div>
</header>

<div class="progress">
  <div class="wrap" style="padding:0">
    <div class="bartrack"><div class="barfill" id="barfill"></div></div>
    <div class="ptext"><span class="pcount" id="pcount">0 picked</span><span id="ppct">0%</span></div>
  </div>
</div>

<div class="wrap">
  <div class="namebar">
    <label for="player">Your name</label>
    <input id="player" type="text" placeholder="e.g. Alice" autocomplete="off" spellcheck="false">
  </div>
  <div id="teams" class="teamgrid"></div>
</div>

<div class="footer-actions">
  <div class="footer-inner">
    <div class="hint" id="fhint">Tap teams to mark them — Download enables once you've picked the right number.</div>
    <div class="btn-row">
      <button class="btn-primary" id="download" disabled>Download</button>
      <button class="btn-secondary" id="share" disabled title="Share via Mail, Messages, WhatsApp etc.">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        <span class="lbl">Share</span>
      </button>
      <button class="btn-secondary" id="copy" disabled title="Copy CSV to clipboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span class="lbl">Copy</span>
      </button>
    </div>
  </div>
</div>
<div class="toast" id="toast" role="status" aria-live="polite">Saved!</div>

<script>
const CTX = {"phase_key": "r16", "round_name": "Round of 16", "round_label_short": "ROUND OF 16", "pick_count": 16, "points_per_correct": 2, "candidates": ["Algeria", "Argentina", "Australia", "Austria", "Belgium", "Bosnia and Herzegovina", "Brazil", "Canada", "Cape Verde", "Colombia", "Croatia", "Curacao", "Czech Republic", "DR Congo", "Ecuador", "Egypt", "England", "France", "Germany", "Ghana", "Haiti", "Iran", "Iraq", "Ivory Coast", "Japan", "Jordan", "Mexico", "Morocco", "Netherlands", "New Zealand", "Norway", "Panama", "Paraguay", "Portugal", "Qatar", "Saudi Arabia", "Scotland", "Senegal", "South Africa", "South Korea", "Spain", "Sweden", "Switzerland", "Tunisia", "Turkey", "United States", "Uruguay", "Uzbekistan"], "candidate_count": 48};
const RECIPIENT_EMAIL = 'brimoran@hotmail.com';

document.getElementById('doctitle').textContent =
  `World Cup 2026 — ${CTX.round_name} Predictions`;
document.getElementById('title').innerHTML =
  `Who Reaches<br><span class="em">The ${CTX.round_name}?</span>`;
document.getElementById('lede').textContent =
  `Tap the ${CTX.pick_count} teams you think will reach the ${CTX.round_name}. ` +
  `Worth ${CTX.points_per_correct} point${CTX.points_per_correct===1?'':'s'} per correct pick.`;

const teamsEl = document.getElementById('teams');
const picks = new Set();
CTX.candidates.forEach(team => {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'team-btn';
  btn.textContent = team;
  btn.dataset.team = team;
  btn.addEventListener('click', () => {
    if (picks.has(team)) { picks.delete(team); btn.classList.remove('sel'); }
    else                 { picks.add(team);    btn.classList.add('sel'); }
    update();
  });
  teamsEl.appendChild(btn);
});

const TARGET = CTX.pick_count;
const nameEl = document.getElementById('player');
const dlBtn = document.getElementById('download');
const shareBtn = document.getElementById('share');
const copyBtn = document.getElementById('copy');
const barfill = document.getElementById('barfill');
const pcount = document.getElementById('pcount');
const ppct = document.getElementById('ppct');
const fhint = document.getElementById('fhint');
const toast = document.getElementById('toast');
const canWebShare = typeof navigator !== 'undefined' && typeof navigator.share === 'function';

function update(){
  const done = picks.size;
  const pct = Math.min(100, Math.round(done/TARGET*100));
  barfill.style.width = pct+'%';
  barfill.classList.toggle('over', done > TARGET);
  pcount.textContent = `${done} of ${TARGET} picked`;
  pcount.className = 'pcount' + (done === TARGET ? ' exact' : done > TARGET ? ' over' : '');
  ppct.textContent = (done > TARGET ? '+' + (done - TARGET) : pct + '%');

  const haveName = nameEl.value.trim() !== '';
  const ready = (done === TARGET) && haveName;
  dlBtn.disabled = !ready;
  shareBtn.disabled = !ready;
  copyBtn.disabled = !ready;

  if (ready) {
    fhint.textContent = 'All set — download the file, or share/copy your picks to send back.';
  } else if (done > TARGET) {
    fhint.textContent = `Too many picks — remove ${done - TARGET} to get to exactly ${TARGET}.`;
  } else if (done < TARGET) {
    const missing = TARGET - done;
    fhint.textContent = `Pick ${missing} more team${missing===1?'':'s'}` + (haveName ? '' : ' and enter your name') + '.';
  } else if (!haveName) {
    fhint.textContent = 'Enter your name to finish.';
  }
}
nameEl.addEventListener('input', update);

function csvSafe(s){
  s = String(s);
  return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
}

function buildCSV(){
  const name = nameEl.value.trim();
  const rows = [
    `# ${CTX.round_label_short} PICKS for ${name}`,
    `# ${TARGET} team(s) marked Y — those you think reach the ${CTX.round_name}.`,
    `# Worth ${CTX.points_per_correct} point(s) per correct pick.`,
    'team,advances (Y/N)'
  ];
  CTX.candidates.forEach(t => {
    rows.push([t, picks.has(t) ? 'Y' : ''].map(csvSafe).join(','));
  });
  return { name, text: rows.join('\n') };
}

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>toast.classList.remove('show'), 3200);
}
function confirmButton(btn, msg){
  const orig = btn.querySelector('.lbl');
  const text = orig ? orig.textContent : null;
  btn.classList.add('confirmed');
  if(orig) orig.textContent = msg;
  setTimeout(()=>{
    btn.classList.remove('confirmed');
    if(orig) orig.textContent = text;
  }, 2200);
}

// --- Download ---
dlBtn.addEventListener('click', ()=>{
  const {name, text} = buildCSV();
  const blob = new Blob([text], {type:'text/csv'});
  const safe = name.replace(/[^A-Za-z0-9._-]+/g,'_');
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `predictions_${safe}_${CTX.phase_key}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('Downloaded — send the file back.');
});

// --- Share via system share sheet ---
shareBtn.addEventListener('click', async ()=>{
  const {name, text} = buildCSV();
  const safe = name.replace(/[^A-Za-z0-9._-]+/g,'_');
  const filename = `predictions_${safe}_${CTX.phase_key}.csv`;
  const subject = `World Cup 2026 — ${CTX.round_name} picks — ${name}`;

  if (canWebShare) {
    try {
      const file = new File([text], filename, {type:'text/csv'});
      if (navigator.canShare && navigator.canShare({files:[file]})) {
        await navigator.share({files:[file], title:subject, text:`${CTX.round_name} picks from ${name}`});
        showToast('Shared!');
        return;
      }
    } catch (e) {
      if (e && e.name === 'AbortError') return;
    }
    try {
      await navigator.share({title:subject, text});
      showToast('Shared!');
      return;
    } catch (e) {
      if (e && e.name === 'AbortError') return;
    }
  }
  const body = encodeURIComponent(text);
  const subj = encodeURIComponent(subject);
  window.location.href = `mailto:${RECIPIENT_EMAIL}?subject=${subj}&body=${body}`;
  showToast('Opening mail…');
});

// --- Copy to clipboard ---
copyBtn.addEventListener('click', async ()=>{
  const {text} = buildCSV();
  try {
    await navigator.clipboard.writeText(text);
    confirmButton(copyBtn, 'Copied!');
    showToast('CSV copied — paste it in a message to send.');
    return;
  } catch (e) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select();
      const ok = document.execCommand('copy');
      ta.remove();
      if (ok) {
        confirmButton(copyBtn, 'Copied!');
        showToast('CSV copied — paste it in a message.');
        return;
      }
    } catch (e2) { /* ignored */ }
    showToast('Copy failed — please use Download or Share.');
  }
});

update();
</script>
</body>
</html>
